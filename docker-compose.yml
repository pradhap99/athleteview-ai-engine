version: "3.9"
services:
  gateway:
    build: ./gateway
    ports: ["3000:3000"]
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      retries: 3

  ai-engine:
    build: ./ai-engine
    ports: ["8001:8001"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - GPU_DEVICE=0
      - MODEL_CACHE_DIR=/app/weights
      - KAFKA_BROKERS=kafka:9092
    volumes:
      - model_weights:/app/weights
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      retries: 3

  streaming:
    build: ./streaming
    ports: ["8002:8002", "9000:9000/udp", "1935:1935"]
    environment:
      - SRT_LISTEN_PORT=9000
      - RTMP_PORT=1935
      - KAFKA_BROKERS=kafka:9092
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }

  biometrics:
    build: ./biometrics
    ports: ["8003:8003"]
    environment:
      - KAFKA_BROKERS=kafka:9092
      - TIMESCALEDB_URL=postgresql://athleteview:secret@timescaledb:5432/athleteview
      - REDIS_URL=redis://redis:6379
    depends_on:
      timescaledb: { condition: service_healthy }
      kafka: { condition: service_healthy }

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    ports: ["9092:9092"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_LOG_DIRS: /tmp/kraft-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 3

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: athleteview
      POSTGRES_USER: athleteview
      POSTGRES_PASSWORD: secret
    volumes:
      - tsdb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U athleteview"]
      interval: 5s
      retries: 3

volumes:
  model_weights:
  tsdb_data:
