# YOLOv11 Fine-tuning for Sports Tracking
task: detect
mode: train
model: yolo11x.pt
data: datasets/sports/data.yaml
epochs: 100
imgsz: 1280
batch: 8
patience: 20
optimizer: AdamW
lr0: 0.001
lrf: 0.01
warmup_epochs: 5
mosaic: 1.0
mixup: 0.3
hsv_h: 0.015
hsv_s: 0.5
hsv_v: 0.3
degrees: 5
translate: 0.1
scale: 0.5
fliplr: 0.5
